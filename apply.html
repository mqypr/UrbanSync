<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Apply - UrbanSync</title>
  <style>
        main {
        max-width: 1200px;
        margin: 3rem auto;
        padding: 0 1.5rem;
        }

        .apply-form-section {
        background: white;
        border-radius: 28px;
        padding: 2.5rem;
        box-shadow: 0 20px 35px -12px rgba(9, 99, 126, 0.2);
        border: 1px solid #d4e9ec;
        }

        .apply-form-section h1 {
        color: #09637e;
        font-size: 2rem;
        margin-bottom: 1.8rem;
        text-align: center;
        font-weight: 700;
        letter-spacing: -0.5px;
        position: relative;
        padding-bottom: 0.8rem;
        }

        .apply-form-section h1::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 4px;
        background: #088395;
        border-radius: 2px;
        }

        form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
        }

        label {
        font-weight: 600;
        color: #09637e;
        font-size: 0.9rem;
        margin-bottom: 0.2rem;
        display: inline-block;
        }

        input, select, textarea {
        width: 100%;
        padding: 0.8rem 1rem;
        border: 1.5px solid #cfe3e6;
        border-radius: 14px;
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.2s;
        background: #fefefe;
        }

        input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #088395;
        box-shadow: 0 0 0 3px rgba(8, 131, 149, 0.15);
        }

        fieldset {
        border: 1.5px solid #cfe3e6;
        border-radius: 18px;
        padding: 1rem 1.2rem;
        margin: 0.5rem 0;
        }

        legend {
        padding: 0 0.8rem;
        font-weight: 700;
        color: #09637e;
        background: white;
        width: auto;
        }

        fieldset label {
        font-weight: 500;
        margin-right: 1rem;
        margin-left: 0.3rem;
        color: #2c5f6b;
        }

        fieldset input {
        width: auto;
        margin-right: 0.2rem;
        }

        input[type="radio"], input[type="checkbox"] {
        width: auto;
        margin-right: 0.3rem;
        accent-color: #088395;
        transform: scale(1.05);
        }

        input[type="submit"] {
        background: #09637e;
        color: white;
        border: none;
        padding: 1rem 2rem;
        font-size: 1.1rem;
        font-weight: 700;
        border-radius: 40px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 1rem;
        width: 100%;
        letter-spacing: 1px;
        }

        input[type="submit"]:hover {
        background: #088395;
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(9, 99, 126, 0.3);
        }

        textarea {
        resize: vertical;
        min-height: 80px;
        }

        /* Phone number with country code - row layout */
        .phone-australia {
        display: flex;
        align-items: center;
        }

        .phone-prefix {
        background: #ebf4f6;
        border: 1.5px solid #cfe3e6;
        border-right: none;
        padding: 0.8rem 1rem;
        border-radius: 14px 0 0 14px;
        color: #09637e;
        font-weight: 600;
        font-size: 0.95rem;
        white-space: nowrap;
        }

        .phone-australia input {
        border-radius: 0 14px 14px 0;
        border-left: none;
        flex: 1;
        }

        /* Date of birth wrapper */
        .dob-wrapper {
        display: flex;
        gap: 10px;
        align-items: center;
        }

        .dob-wrapper input {
        flex: 1;
        }

        .dob-hint {
        font-size: 12px;
        color: #7ab3b2;
        margin-top: 5px;
        }

        /* Hide br tags from original HTML inside form */
        .apply-form-section form br {
        display: none;
        }

        /* Input placeholder styling */
        input::placeholder {
        color: #b8d4d8;
        font-size: 0.85rem;
        }

        @media (max-width: 768px) {
        main {
            padding: 0 1rem;
            margin: 2rem auto;
        }
        .apply-form-section {
            padding: 1.5rem;
        }
        .apply-form-section h1 {
            font-size: 1.6rem;
        }
        .phone-wrapper {
            flex-direction: column;
            gap: 8px;
        }
        .phone-wrapper select {
            width: 100%;
        }
        .dob-wrapper {
            flex-direction: column;
            gap: 8px;
        }
        }
    </style>
</head>

<body>
  <!-- Header & Navbar -->
  <header>
    <nav class="navbar">
      <div class="navbar-container">
        <div class="navbar-logo">
          <a href="/about.html"><img src="images/logo.png" class="logo-pic" alt="UrbanSync Logo"></a>
        </div>
        <ul class="navbar-link">
          <li class="navbar-link-item">
            <a href="/jobs.html" class="navbar-link-item-a">JOB DESCRIPTION</a>
          </li>
          <li class="navbar-link-item">
            <a href="/apply.html" class="navbar-link-item-a">APPLY</a>
          </li>
          <li class="navbar-link-item">
            <a href="/about.html" class="navbar-link-item-a">ABOUT</a>
          </li>
        </ul>
        <form class="search-bar">
          <input type="text" name="search-text" placeholder="SEARCH FOR JOBS..." class="search-text">
          <button type="submit" class="job-search-button">SEARCH</button>
        </form>
      </div>
    </nav>
  </header>

  <main>
    <section class="apply-form-section">
      <h1>Job Application Form</h1>
      <form action="https://mercury.swin.edu.au/it000000/formtest.php" method="POST">

        <!-- Job Reference Number -->
        <label for="jobRef">Job Reference Number:</label>
        <input type="text" id="jobRef" name="jobRef" pattern="[A-Za-z0-9]{5}" required>
        <br><br>

        <!-- First Name -->
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" pattern="[A-Za-z]{1,20}" required>
        <br><br>

        <!-- Last Name -->
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" pattern="[A-Za-z]{1,20}" required>
        <br><br>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth (dd/mm/yyyy):</label>
        <input type="text" id="dob" name="dob" pattern="\d{2}/\d{2}/\d{4}" placeholder="dd/mm/yyyy" required>
        <br><br>

        <!-- Gender -->
        <fieldset>
          <legend>Gender:</legend>
          <input type="radio" id="male" name="gender" value="Male" required>
          <label for="male">Male</label>
          <input type="radio" id="female" name="gender" value="Female" required>
          <label for="female">Female</label>
          <input type="radio" id="other" name="gender" value="Other" required>
          <label for="other">Other</label>
        </fieldset>
        <br>

        <!-- Street Address -->
        <label for="address">Street Address:</label>
        <input type="text" id="address" name="address" maxlength="40" required>
        <br><br>

        <!-- Suburb/Town -->
        <label for="suburb">Suburb/Town:</label>
        <input type="text" id="suburb" name="suburb" maxlength="40" required>
        <br><br>

        <!-- State -->
        <label for="state">State:</label>
        <select id="state" name="state" required>
          <option value="">Select</option>
          <option value="VIC">VIC</option>
          <option value="NSW">NSW</option>
          <option value="QLD">QLD</option>
          <option value="NT">NT</option>
          <option value="WA">WA</option>
          <option value="SA">SA</option>
          <option value="TAS">TAS</option>
          <option value="ACT">ACT</option>
        </select>
        <br><br>

        <!-- Postcode -->
        <label for="postcode">Postcode:</label>
        <input type="text" id="postcode" name="postcode" pattern="\d{4}" required>
        <br><br>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <!-- Phone Number -->
        <label for="phone">Phone Number:</label>
        <div class="phone-australia">
        <span class="phone-prefix">+61 AUS</span>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{8,12}" placeholder="Phone number" required>
        </div>

        <!-- Skill List -->
        <fieldset>
          <legend>Skills:</legend>
          <input type="checkbox" id="skill1" name="skills" value="Programming">
          <label for="skill1">Programming</label>
          <input type="checkbox" id="skill2" name="skills" value="Networking">
          <label for="skill2">Networking</label>
          <input type="checkbox" id="skill3" name="skills" value="Data Analysis">
          <label for="skill3">Data Analysis</label>
          <input type="checkbox" id="skill4" name="skills" value="Project Management">
          <label for="skill4">Project Management</label>
        </fieldset>
        <br>

        <!-- Other Skills -->
        <label for="otherSkills">Other Skills:</label>
        <textarea id="otherSkills" name="otherSkills" rows="4" cols="50"></textarea>
        <br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit Application">

      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <nav>
      <div class="footer-container">
        <div class="footer-column">
          <h4 class="footer-column-title">Pages</h4>
          <ul class="footer-column-list">
            <li class="footer-column-item"><a href="/index.html">Home</a></li>
            <li class="footer-column-item"><a href="/jobs.html">Job Description</a></li>
            <li class="footer-column-item"><a href="/apply.html">Apply</a></li>
            <li class="footer-column-item"><a href="/about.html">About</a></li>
          </ul>
        </div>
        <div class="footer-column">
          <h4 class="footer-column-title">Resources</h4>
          <ul class="footer-column-list">
            <li class="footer-column-item"><a href="https://github.com/mqypr/UrbanSync">Github Repository</a></li>
            <li><a class="footer-column-item" href="https://pengreach123.atlassian.net/">Jira</a></li>
          </ul>
        </div>
        <div class="footer-column">
          <h4 class="footer-column-title">Contact Us</h4>
          <ul class="footer-column-list">
            <li><a href="mailto:blank" class="footer-column-item">Email</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </footer>
</body>

</html>
